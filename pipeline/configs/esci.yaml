# Place the ESCI .jsonl.gz files under data/external/esci/
# before running: see README.md for instructions on obtaining the source files.

dataset: esci

source:
  input_dir: data/external/esci
  # ESCI already uses "product_id" as the identifier field.
  product_id_field: product_id

paths:
  raw_products:        data/raw/esci/patented_products.jsonl
  interim_pairs:       data/interim/esci/patent_product_pairs.jsonl
  pairs_with_kinds:    data/interim/esci/patent_product_pairs_with_kind_codes.jsonl
  patent_info:         data/interim/esci/patent_product_with_patent_info.jsonl
  patent_info_cleaned: data/interim/esci/patent_product_with_patent_info_cleaned.jsonl
  merged_dataset:      data/processed/esci/full_patent_product_dataset.jsonl
  merged_stats:        data/processed/esci/stats/full_dataset_stats.json
  examples:            data/processed/esci/examples/example_set.json
  patent_cache:        data/interim/patent_cache

review_steps:
  step_02: pipeline/review_steps/esci/step_02_manual_changes.jsonl
  step_03: pipeline/review_steps/esci/step_03_manual_changes.jsonl

scraping:
  kind_codes_batch_size: 300
  kind_codes_max_workers: 5
  patent_info_batch_size: 300
  patent_info_max_workers: 5
  request_delay: 2.0

examples:
  n: 20
  seed: 42
